name: Vangers MacOS Build

on: [push, pull_request]
env:
  MACOSX_DEPLOYMENT_TARGET: 11

jobs:
  build:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    
    - name: install libs
      run: |
        brew install ninja yasm dylibbundler
        
    - name: install our libs
      run: |
        brew install sdl2 sdl2_net libvorbis libogg libsndfile
        
    - name: clunk -- download lib
      run: git clone --depth 1 https://github.com/stalkerg/clunk.git clunk
      
    - name: clunk -- create build dir
      run: mkdir clunk/build
      
    - name: clunk -- build and install
      # Changed CMAKE_INSTALL_PREFIX to a local runner directory to avoid /usr/local restrictions
      run: cmake -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/local_install -G Ninja .. && ninja && ninja install
      working-directory: clunk/build
      env:
        MACOSX_DEPLOYMENT_TARGET: 11

    - name: ffmpeg -- download
      run: git clone --depth 1 --branch n4.2.3 https://git.ffmpeg.org/ffmpeg.git ffmpeg
      
    - name: ffmpeg -- configure
      # Changed --arch to arm64, removed cpu, fixed prefix path
      run: |
        ./configure --enable-shared --prefix=${{ github.workspace }}/local_install \
        --cc=clang \
        --arch=arm64 \
        --disable-everything \
        --enable-swscale \
        --enable-zlib \
        --enable-demuxer=avi,rawvideo \
        --enable-decoder=png,rawvideo,h264 \
        --enable-parser=png \
        --enable-protocol=file \
        --disable-d3d11va \
        --disable-dxva2 \
        --disable-avx \
        --disable-doc --disable-ffplay --disable-ffprobe --disable-ffmpeg \
        --disable-static --disable-bzlib --disable-libopenjpeg --disable-iconv
      working-directory: ffmpeg
      
    - name: ffmpeg -- build and install
      run: |
        make -j4
        make install
      working-directory: ffmpeg
      
    - name: configure
      # Tell CMake where to look for your freshly compiled clunk and ffmpeg libraries
      run: mkdir build && cd build && cmake -G Ninja -DCMAKE_PREFIX_PATH=${{ github.workspace }}/local_install ..
      
    - name: make
      run: ninja
      working-directory: build
      
    - name: vangers -- prepare release folder
      run: |
        mkdir -p Vangers.app/Contents/Frameworks
        mkdir -p Vangers.app/Contents/Libs
        mkdir -p Vangers.app/Contents/MacOS
        
        # Updated paths dynamically pointing to the Apple Silicon homebrew location (/opt/homebrew)
        cp -L /opt/homebrew/lib/libSDL2-2.0.0.dylib Vangers.app/Contents/Libs/
        cp -L /opt/homebrew/lib/libSDL2_net-2.0.0.dylib Vangers.app/Contents/Libs/
        cp -L ${{ github.workspace }}/local_install/lib/libavcodec.58.54.100.dylib Vangers.app/Contents/Libs/
        cp -L ${{ github.workspace }}/local_install/lib/libavformat.58.29.100.dylib Vangers.app/Contents/Libs/
        cp -L ${{ github.workspace }}/local_install/lib/libavutil.56.31.100.dylib Vangers.app/Contents/Libs/
        cp -L /opt/homebrew/lib/libogg.0.dylib Vangers.app/Contents/Libs/
        cp -L /opt/homebrew/lib/libvorbis.0.dylib Vangers.app/Contents/Libs/
        cp -L /opt/homebrew/lib/libvorbisfile.3.dylib Vangers.app/Contents/Libs/
        cp clunk/build/libclunk.dylib Vangers.app/Contents/Libs/
        cp build/src/vangers Vangers.app/Contents/MacOS/Vangers
        
        dylibbundler -x Vangers.app/Contents/MacOS/Vangers
        strip Vangers.app/Contents/MacOS/Vangers
        chmod 777 Vangers.app/Contents/Libs/*
        
        # Dynamic installation updates targeting homebrew's arm64 path layout
        install_name_tool -change /opt/homebrew/opt/libogg/lib/libogg.0.dylib "@executable_path/../Libs/libogg.0.dylib" Vangers.app/Contents/Libs/libvorbis.0.dylib
        install_name_tool -change /opt/homebrew/opt/libvorbis/lib/libvorbis.0.dylib "@executable_path/../Libs/libvorbis.0.dylib" Vangers.app/Contents/Libs/libvorbisfile.3.dylib
        install_name_tool -change /opt/homebrew/opt/libogg/lib/libogg.0.dylib "@executable_path/../Libs/libogg.0.dylib" Vangers.app/Contents/Libs/libvorbisfile.3.dylib
        
        mv Vangers.app/Contents/Libs/libavcodec.58.54.100.dylib Vangers.app/Contents/Libs/libavcodec.58.dylib
        mv Vangers.app/Contents/Libs/libavformat.58.29.100.dylib Vangers.app/Contents/Libs/libavformat.58.dylib
        mv Vangers.app/Contents/Libs/libavutil.56.31.100.dylib Vangers.app/Contents/Libs/libavutil.56.dylib
        
        install_name_tool -change "@executable_path/../libs/libavcodec.58.54.100.dylib" "@executable_path/../Libs/libavcodec.58.dylib" Vangers.app/Contents/MacOS/Vangers
        install_name_tool -change "@executable_path/../libs/libavformat.58.29.100.dylib" "@executable_path/../Libs/libavformat.58.dylib" Vangers.app/Contents/MacOS/Vangers
        install_name_tool -change "@executable_path/../libs/libavutil.56.31.100.dylib" "@executable_path/../Libs/libavutil.56.dylib" Vangers.app/Contents/MacOS/Vangers
        
        install_name_tool -change "${{ github.workspace }}/local_install/lib/libavutil.56.dylib" "@executable_path/../Libs/libavutil.56.dylib" Vangers.app/Contents/Libs/libavcodec.58.dylib
        install_name_tool -change "${{ github.workspace }}/local_install/lib/libavutil.56.dylib" "@executable_path/../Libs/libavutil.56.dylib" Vangers.app/Contents/Libs/libavformat.58.dylib
        install_name_tool -change "${{ github.workspace }}/local_install/lib/libavcodec.58.dylib" "@executable_path/../Libs/libavcodec.58.dylib" Vangers.app/Contents/Libs/libavformat.58.dylib
        install_name_tool -change "/opt/homebrew/opt/sdl2/lib/libSDL2-2.0.0.dylib" "@executable_path/../Libs/libSDL2-2.0.0.dylib" Vangers.app/Contents/Libs/libSDL2_net-2.0.0.dylib
        
        tar -cvf Vangers.app.tar Vangers.app
        
    - uses: actions/upload-artifact@v4
      with:
        name: Vangers.app.tar
        path: Vangers.app.tar
